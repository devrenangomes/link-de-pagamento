<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprar Ingressos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-blue: #0003ff;
      --brand-yellow: #ffce00;
      --brand-white: #ffffff;
      --blue-50: #eef0ff;
      --blue-100: #dde1ff;
      --blue-200: #b4bcfd;
      --blue-300: #8089fb;
      --blue-400: #4a55fa;
      --blue-500: #2a30f8;
      --blue-600: #0003ff;
      --blue-700: #0002cc;
      --yellow-50: #fffae6;
      --yellow-100: #fff2b8;
      --yellow-200: #ffe680;
      --yellow-300: #ffd84d;
      --yellow-400: #ffce00;
      --ink-950: #050720;
      --ink-900: #0a0f2c;
      --ink-800: #161c40;
      --ink-700: #2a3055;
      --ink-600: #444a72;
      --ink-500: #6b7191;
      --ink-400: #9097b0;
      --ink-300: #b8bdcd;
      --ink-200: #d4d7e3;
      --ink-100: #e7e9f1;
      --ink-50: #f2f4f9;
      --paper: #fafbff;
      --success: #1aa86a;
      --warning: #f59e0b;
      --danger: #e5384b;
      --bg-app: var(--paper);
      --bg-surface: var(--brand-white);
      --bg-sunken: var(--ink-50);
      --fg-1: var(--ink-900);
      --fg-2: var(--ink-700);
      --fg-3: var(--ink-500);
      --fg-muted: var(--ink-400);
      --fg-on-brand: var(--brand-white);
      --fg-link: var(--blue-600);
      --border-1: var(--ink-100);
      --border-2: var(--ink-200);
      --border-3: var(--ink-300);
      --font-display: "Outfit", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Manrope", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
      --fs-xs: 0.75rem;
      --fs-sm: 0.875rem;
      --fs-md: 1rem;
      --fs-lg: 1.125rem;
      --fs-xl: 1.375rem;
      --fs-2xl: 1.75rem;
      --fs-3xl: 2.25rem;
      --fs-4xl: 3rem;
      --lh-snug: 1.2;
      --lh-normal: 1.45;
      --lh-loose: 1.65;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --shadow-sm: 0 2px 6px rgba(10, 15, 44, 0.06), 0 1px 2px rgba(10, 15, 44, 0.04);
      --shadow-md: 0 8px 20px rgba(10, 15, 44, 0.08), 0 2px 6px rgba(10, 15, 44, 0.05);
      --shadow-lg: 0 18px 40px rgba(10, 15, 44, 0.10), 0 4px 12px rgba(10, 15, 44, 0.06);
      --shadow-brand: 0 12px 28px rgba(0, 3, 255, 0.32);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast: 120ms;
      --dur-base: 220ms;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-app);
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
      color: var(--fg-1);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: var(--fs-3xl);
      font-weight: 700;
      color: var(--brand-blue);
      margin-bottom: var(--space-2);
      letter-spacing: -0.02em;
    }
    .header p {
      color: var(--fg-2);
      font-size: var(--fs-sm);
      line-height: var(--lh-normal);
    }

    .card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }
    .card h2 {
      font-family: var(--font-display);
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--fg-1);
      margin-bottom: var(--space-5);
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .ticket-option {
      position: relative;
      cursor: pointer;
    }
    .ticket-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .ticket-card {
      border: 2px solid var(--border-2);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      text-align: center;
      transition: all var(--dur-base) var(--ease-out);
      user-select: none;
    }
    .ticket-card .icon {
      font-size: 2rem;
      margin-bottom: var(--space-3);
      line-height: 1;
    }
    .ticket-card .name {
      font-weight: 700;
      font-size: var(--fs-md);
      color: var(--fg-1);
      font-family: var(--font-display);
    }
    .ticket-card .sub {
      font-size: var(--fs-xs);
      color: var(--fg-3);
      margin-top: var(--space-1);
    }
    .ticket-card .price {
      font-size: var(--fs-2xl);
      font-weight: 800;
      color: var(--brand-blue);
      margin-top: var(--space-3);
      font-family: var(--font-display);
    }

    .ticket-option input:checked + .ticket-card {
      border-color: var(--brand-blue);
      background: var(--blue-50);
      box-shadow: var(--shadow-md);
    }
    .ticket-card:hover {
      border-color: var(--brand-blue);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }
    .qty-row label {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--fg-1);
      flex: 1;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border-2);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      font-size: var(--fs-lg);
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--dur-fast) var(--ease-out);
      color: var(--fg-2);
    }
    .qty-btn:hover {
      border-color: var(--brand-blue);
      color: var(--brand-blue);
      transform: translateY(-1px);
    }
    .qty-value {
      font-size: var(--fs-lg);
      font-weight: 700;
      min-width: 2rem;
      text-align: center;
      color: var(--fg-1);
    }

    .form-row { margin-bottom: var(--space-4); }
    .form-row label {
      display: block;
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--fg-1);
      margin-bottom: var(--space-2);
    }
    .form-row input {
      width: 100%;
      padding: var(--space-3);
      border: 1.5px solid var(--border-2);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      font-family: inherit;
      transition: all var(--dur-base) var(--ease-out);
      background: var(--bg-surface);
      color: var(--fg-1);
    }
    .form-row input::placeholder {
      color: var(--fg-muted);
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0, 3, 255, 0.1);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .total-bar {
      background: var(--blue-50);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--space-5);
      border-left: 4px solid var(--brand-blue);
    }
    .total-bar .label {
      font-size: var(--fs-sm);
      color: var(--fg-2);
      font-weight: 600;
    }
    .total-bar .value {
      font-size: var(--fs-2xl);
      font-weight: 800;
      color: var(--brand-blue);
      font-family: var(--font-display);
    }

    .btn-pay {
      width: 100%;
      padding: var(--space-4);
      background: var(--brand-blue);
      color: var(--fg-on-brand);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--fs-md);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: var(--space-5);
      transition: all var(--dur-base) var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
    }
    .btn-pay:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-brand);
    }
    .btn-pay:active { transform: translateY(0); }
    .btn-pay:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .pix-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--yellow-50);
      color: #7a6000;
      border-radius: var(--radius-sm);
      padding: var(--space-1) var(--space-3);
      font-size: var(--fs-xs);
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      color: var(--fg-3);
      font-size: var(--fs-xs);
      margin-top: var(--space-6);
      line-height: var(--lh-loose);
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .ticket-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: var(--fs-2xl); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="evento-nome">Comprar Ingressos</h1>
      <p>Pagamento via PIX — rápido e seguro</p>
    </div>

    <form id="form-checkout" action="/checkout" method="POST">
      <div class="card">
        <h2>Selecione seu ingresso</h2>

        <div class="ticket-grid">
          <label class="ticket-option">
            <input type="radio" name="tipo" value="mesa" id="tipo-mesa" required />
            <div class="ticket-card">
              <div class="icon">●</div>
              <div class="name">Mesa</div>
              <div class="sub">4 lugares</div>
              <div class="price">R$ 130,00</div>
            </div>
          </label>

          <label class="ticket-option">
            <input type="radio" name="tipo" value="individual" id="tipo-individual" required />
            <div class="ticket-card">
              <div class="icon">●</div>
              <div class="name">Individual</div>
              <div class="sub">1 lugar</div>
              <div class="price">R$ 40,00</div>
            </div>
          </label>
        </div>

        <div class="qty-row">
          <label>Quantidade</label>
          <div class="qty-controls">
            <button type="button" class="qty-btn" id="btn-minus">−</button>
            <span class="qty-value" id="qty-display">1</span>
            <button type="button" class="qty-btn" id="btn-plus">+</button>
          </div>
        </div>
        <input type="hidden" name="quantidade" id="quantidade-input" value="1" />

        <div class="total-bar">
          <span class="label">Total a pagar</span>
          <span class="value" id="total-display">—</span>
        </div>
      </div>

      <div class="card">
        <h2>Dados do responsável</h2>

        <div class="form-row">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required autocomplete="name" />
        </div>

        <div class="form-grid">
          <div class="form-row">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required inputmode="numeric" />
          </div>
          <div class="form-row">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" maxlength="15" required inputmode="numeric" />
          </div>
        </div>

        <div class="form-row">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn-pay" id="btn-pay">
          <span>Gerar QR Code PIX</span>
          <span class="pix-badge">PIX</span>
        </button>
      </div>
    </form>

    <p class="footer-note">Pagamento seguro via PIX — Efí Bank</p>
  </div>

  <script>
    const PRECOS = { mesa: 130, individual: 40 };
    let tipo = null;
    let quantidade = 1;

    document.title = 'Comprar Ingressos';
    fetch('/api/stats').catch(() => {});

    function updateTotal() {
      const display = document.getElementById('total-display');
      if (!tipo) {
        display.textContent = '—';
        return;
      }
      const valor = PRECOS[tipo] * quantidade;
      display.textContent = `R$ ${valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
    }

    document.querySelectorAll('input[name="tipo"]').forEach(radio => {
      radio.addEventListener('change', e => {
        tipo = e.target.value;
        updateTotal();
      });
    });

    document.getElementById('btn-minus').addEventListener('click', () => {
      if (quantidade > 1) {
        quantidade--;
        document.getElementById('qty-display').textContent = quantidade;
        document.getElementById('quantidade-input').value = quantidade;
        updateTotal();
      }
    });

    document.getElementById('btn-plus').addEventListener('click', () => {
      if (quantidade < 20) {
        quantidade++;
        document.getElementById('qty-display').textContent = quantidade;
        document.getElementById('quantidade-input').value = quantidade;
        updateTotal();
      }
    });

    document.getElementById('cpf').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      this.value = v;
    });

    document.getElementById('telefone').addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length >= 7) {
        v = v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
      } else if (v.length >= 3) {
        v = v.replace(/^(\d{2})(\d+)/, '($1) $2');
      }
      this.value = v;
    });

    document.getElementById('form-checkout').addEventListener('submit', function (e) {
      if (!tipo) {
        e.preventDefault();
        alert('Por favor, selecione o tipo de ingresso.');
        return;
      }
      const cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');
      if (cpfLimpo.length !== 11) {
        e.preventDefault();
        alert('CPF inválido. Digite os 11 dígitos.');
        return;
      }
      const btn = document.getElementById('btn-pay');
      btn.disabled = true;
      btn.innerHTML = '<span>Gerando cobrança PIX...</span>';
    });
  </script>
</body>
</html>
