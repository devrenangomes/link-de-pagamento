<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Vendas de Ingressos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-blue: #0003ff;
      --brand-yellow: #ffce00;
      --ink-950: #050720;
      --ink-900: #0a0f2c;
      --ink-700: #2a3055;
      --ink-600: #444a72;
      --ink-500: #6b7191;
      --ink-400: #9097b0;
      --ink-200: #d4d7e3;
      --ink-100: #e7e9f1;
      --ink-50: #f2f4f9;
      --paper: #fafbff;
      --success: #1aa86a;
      --warning: #f59e0b;
      --danger: #e5384b;
      --blue-50: #eef0ff;
      --bg-app: var(--paper);
      --bg-surface: var(--brand-white, #ffffff);
      --bg-sunken: var(--ink-50);
      --fg-1: var(--ink-900);
      --fg-2: var(--ink-700);
      --fg-3: var(--ink-500);
      --fg-muted: var(--ink-400);
      --border-1: var(--ink-100);
      --border-2: var(--ink-200);
      --font-display: "Outfit", ui-sans-serif, system-ui, sans-serif;
      --font-body: "Manrope", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
      --fs-xs: 0.75rem;
      --fs-sm: 0.875rem;
      --fs-md: 1rem;
      --fs-lg: 1.125rem;
      --fs-2xl: 1.75rem;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
      --shadow-md: 0 8px 20px rgba(10, 15, 44, 0.08), 0 2px 6px rgba(10, 15, 44, 0.05);
      --dur-base: 220ms;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-app);
      color: var(--fg-1);
      min-height: 100vh;
    }

    .topbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-2);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .topbar h1 {
      font-family: var(--font-display);
      font-size: var(--fs-lg);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .topbar-actions { display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap; }

    .btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--dur-base) var(--ease-out);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      text-decoration: none;
    }
    .btn-outline {
      border: 1.5px solid var(--border-2);
      background: var(--bg-surface);
      color: var(--fg-2);
    }
    .btn-outline:hover {
      border-color: var(--brand-blue);
      color: var(--brand-blue);
      transform: translateY(-1px);
    }
    .btn-primary {
      border: none;
      background: var(--brand-blue);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-success {
      border: none;
      background: var(--success);
      color: white;
    }
    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .content { padding: var(--space-6); max-width: 1280px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .stat-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: var(--space-5) var(--space-6);
    }
    .stat-card .label {
      font-family: var(--font-display);
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-3);
    }
    .stat-card .value {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: 800;
      line-height: 1;
    }
    .stat-card .sub {
      font-size: var(--fs-xs);
      color: var(--fg-muted);
      margin-top: var(--space-1);
    }
    .stat-card.verde .value { color: var(--success); }
    .stat-card.azul .value { color: var(--brand-blue); }
    .stat-card.amarelo .value { color: var(--warning); }
    .stat-card.roxo .value { color: #7C3AED; }

    .table-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .table-header {
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .table-header h2 {
      font-family: var(--font-display);
      font-size: var(--fs-md);
      font-weight: 700;
      color: var(--fg-1);
    }

    .search-box {
      padding: var(--space-2) var(--space-3);
      border: 1.5px solid var(--border-2);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      font-family: inherit;
      min-width: 220px;
      transition: border-color var(--dur-base) var(--ease-out);
    }
    .search-box:focus {
      outline: none;
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(0, 3, 255, 0.1);
    }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-sm);
    }
    thead tr {
      background: var(--bg-sunken);
      border-bottom: 1px solid var(--border-2);
    }
    th {
      padding: var(--space-3) var(--space-4);
      text-align: left;
      font-size: var(--fs-xs);
      font-weight: 700;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--fg-3);
      white-space: nowrap;
    }
    td {
      padding: var(--space-4);
      color: var(--fg-2);
      border-bottom: 1px solid var(--border-1);
      white-space: nowrap;
    }
    tbody tr:hover { background: var(--bg-sunken); }
    tbody tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 600;
    }
    .badge-pago { background: #e8f5e9; color: #1b5e20; }
    .badge-pendente { background: var(--yellow-50, #fffae6); color: #7a6000; }

    .tipo-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--fs-xs);
      font-weight: 600;
      background: var(--blue-50);
      color: var(--brand-blue);
    }

    .empty {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--fg-muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: var(--space-3); line-height: 1; }

    .filter-tabs {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: var(--space-2) var(--space-4);
      border: 1.5px solid var(--border-2);
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 600;
      cursor: pointer;
      background: var(--bg-surface);
      color: var(--fg-2);
      transition: all var(--dur-base) var(--ease-out);
      font-family: inherit;
    }
    .filter-tab:hover, .filter-tab.ativo {
      border-color: var(--brand-blue);
      color: var(--brand-blue);
      background: var(--blue-50);
    }

    .refresh-info {
      font-size: var(--fs-xs);
      color: var(--fg-muted);
    }

    @media (max-width: 600px) {
      .topbar { flex-direction: column; align-items: flex-start; gap: var(--space-3); }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .table-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📊 Painel de Vendas</h1>
    <div class="topbar-actions">
      <span class="refresh-info" id="ultima-atualizacao"></span>
      <button class="btn btn-outline" onclick="carregar()">🔄 Atualizar</button>
      <a href="/api/exportar-csv" class="btn btn-success" download>⬇️ Exportar CSV</a>
      <a href="/" class="btn btn-primary">+ Novo Ingresso</a>
    </div>
  </div>

  <div class="content">
    <!-- Estatísticas -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card verde">
        <div class="label">💰 Total Arrecadado</div>
        <div class="value" id="stat-arrecadado">—</div>
        <div class="sub">somente pagos</div>
      </div>
      <div class="stat-card azul">
        <div class="label">🪑 Mesas Vendidas</div>
        <div class="value" id="stat-mesas">—</div>
        <div class="sub" id="sub-mesas">4 lugares cada</div>
      </div>
      <div class="stat-card roxo">
        <div class="label">👤 Individuais</div>
        <div class="value" id="stat-individuais">—</div>
        <div class="sub">ingressos avulsos</div>
      </div>
      <div class="stat-card amarelo">
        <div class="label">⏳ Pendentes</div>
        <div class="value" id="stat-pendentes">—</div>
        <div class="sub">aguardando pagamento</div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-card">
      <div class="table-header">
        <h2>Todas as vendas</h2>
        <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
          <div class="filter-tabs">
            <button class="filter-tab ativo" onclick="filtrar('todos', this)">Todos</button>
            <button class="filter-tab" onclick="filtrar('PAGO', this)">✅ Pagos</button>
            <button class="filter-tab" onclick="filtrar('PENDENTE', this)">⏳ Pendentes</button>
          </div>
          <input class="search-box" type="text" placeholder="🔍 Buscar por nome ou CPF..." oninput="buscar(this.value)" />
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Data / Hora</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Tipo</th>
              <th>Qtd.</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabela-corpo">
            <tr><td colspan="10" class="empty"><div class="icon">⏳</div>Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let todasVendas = [];
    let filtroAtivo = 'todos';
    let busca = '';

    async function carregar() {
      try {
        const res = await fetch('/api/stats');
        const d = await res.json();

        document.getElementById('stat-arrecadado').textContent =
          `R$ ${parseFloat(d.arrecadado).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('stat-mesas').textContent = d.mesas;
        document.getElementById('stat-individuais').textContent = d.individuais;
        document.getElementById('stat-pendentes').textContent = d.pendentes;
        document.getElementById('sub-mesas').textContent =
          `${d.mesas * 4} lugares vendidos`;

        todasVendas = d.vendas || [];
        renderizar();

        const agora = new Date().toLocaleTimeString('pt-BR');
        document.getElementById('ultima-atualizacao').textContent = `Atualizado às ${agora}`;
      } catch (err) {
        console.error(err);
      }
    }

    function filtrar(status, btn) {
      filtroAtivo = status;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      renderizar();
    }

    function buscar(val) {
      busca = val.toLowerCase();
      renderizar();
    }

    function renderizar() {
      let lista = [...todasVendas];

      if (filtroAtivo !== 'todos') {
        lista = lista.filter(v => v.status === filtroAtivo);
      }

      if (busca) {
        lista = lista.filter(v =>
          (v.nome || '').toLowerCase().includes(busca) ||
          (v.cpf || '').includes(busca)
        );
      }

      // Mais recentes primeiro
      lista.reverse();

      const tbody = document.getElementById('tabela-corpo');

      if (lista.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10">
          <div class="empty">
            <div class="icon">🔍</div>
            Nenhuma venda encontrada
          </div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map((v, i) => `
        <tr>
          <td style="color:#9CA3AF;font-size:.75rem">${lista.length - i}</td>
          <td>${v.data || '—'}</td>
          <td><strong>${v.nome || '—'}</strong></td>
          <td style="font-family:monospace">${v.cpf || '—'}</td>
          <td>${v.email || '—'}</td>
          <td>${v.telefone || '—'}</td>
          <td>
            <span class="tipo-badge">
              ${v.tipo === 'mesa' ? '🪑 Mesa' : '👤 Individual'}
            </span>
          </td>
          <td style="text-align:center">${v.quantidade || '—'}</td>
          <td><strong>R$ ${parseFloat(v.total || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</strong></td>
          <td>
            <span class="badge ${v.status === 'PAGO' ? 'badge-pago' : 'badge-pendente'}">
              ${v.status === 'PAGO' ? '✅ Pago' : '⏳ Pendente'}
            </span>
          </td>
        </tr>
      `).join('');
    }

    carregar();
    setInterval(carregar, 30000); // Atualiza a cada 30s
  </script>
</body>
</html>
