<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Vendas de Ingressos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F46E5;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h1 { font-size: 1.125rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
    .topbar-actions { display: flex; gap: .75rem; }

    .btn {
      padding: .5rem 1.125rem;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      text-decoration: none;
    }
    .btn-outline {
      border: 1.5px solid var(--gray-200);
      background: white;
      color: var(--gray-700);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary {
      border: none;
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-success {
      border: none;
      background: var(--success);
      color: white;
    }
    .btn-success:hover { opacity: .88; }

    /* Content */
    .content { padding: 1.5rem; max-width: 1280px; margin: 0 auto; }

    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem;
    }
    .stat-card .label {
      font-size: .8125rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: .5rem;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-card .sub {
      font-size: .8125rem;
      color: var(--gray-400);
      margin-top: .25rem;
    }
    .stat-card.verde .value { color: var(--success); }
    .stat-card.azul .value { color: var(--primary); }
    .stat-card.amarelo .value { color: var(--warning); }
    .stat-card.roxo .value { color: #7C3AED; }

    /* Table */
    .table-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .table-header h2 { font-size: 1rem; font-weight: 700; color: var(--gray-700); }

    .search-box {
      padding: .5rem .875rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: .875rem;
      font-family: inherit;
      min-width: 220px;
      transition: border-color .2s;
    }
    .search-box:focus { outline: none; border-color: var(--primary); }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    thead tr {
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }
    th {
      padding: .75rem 1rem;
      text-align: left;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--gray-500);
      white-space: nowrap;
    }
    td {
      padding: .875rem 1rem;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
      white-space: nowrap;
    }
    tbody tr:hover { background: var(--gray-50); }
    tbody tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-pago { background: #D1FAE5; color: #065F46; }
    .badge-pendente { background: #FEF3C7; color: #92400E; }

    .tipo-badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      padding: .2rem .6rem;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 600;
      background: #EEF2FF;
      color: var(--primary);
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray-400);
    }
    .empty .icon { font-size: 3rem; margin-bottom: .75rem; }

    /* Filtros de status */
    .filter-tabs {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: .3rem .8rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      font-size: .8125rem;
      font-weight: 600;
      cursor: pointer;
      background: white;
      color: var(--gray-600);
      transition: all .15s;
      font-family: inherit;
    }
    .filter-tab:hover, .filter-tab.ativo {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light, #EEF2FF);
    }

    .refresh-info {
      font-size: .75rem;
      color: var(--gray-400);
    }

    @media (max-width: 600px) {
      .topbar { flex-direction: column; align-items: flex-start; gap: .75rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .table-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>📊 Painel de Vendas</h1>
    <div class="topbar-actions">
      <span class="refresh-info" id="ultima-atualizacao"></span>
      <button class="btn btn-outline" onclick="carregar()">🔄 Atualizar</button>
      <a href="/api/exportar-csv" class="btn btn-success" download>⬇️ Exportar CSV</a>
      <a href="/" class="btn btn-primary">+ Novo Ingresso</a>
    </div>
  </div>

  <div class="content">
    <!-- Estatísticas -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card verde">
        <div class="label">💰 Total Arrecadado</div>
        <div class="value" id="stat-arrecadado">—</div>
        <div class="sub">somente pagos</div>
      </div>
      <div class="stat-card azul">
        <div class="label">🪑 Mesas Vendidas</div>
        <div class="value" id="stat-mesas">—</div>
        <div class="sub" id="sub-mesas">4 lugares cada</div>
      </div>
      <div class="stat-card roxo">
        <div class="label">👤 Individuais</div>
        <div class="value" id="stat-individuais">—</div>
        <div class="sub">ingressos avulsos</div>
      </div>
      <div class="stat-card amarelo">
        <div class="label">⏳ Pendentes</div>
        <div class="value" id="stat-pendentes">—</div>
        <div class="sub">aguardando pagamento</div>
      </div>
    </div>

    <!-- Tabela -->
    <div class="table-card">
      <div class="table-header">
        <h2>Todas as vendas</h2>
        <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
          <div class="filter-tabs">
            <button class="filter-tab ativo" onclick="filtrar('todos', this)">Todos</button>
            <button class="filter-tab" onclick="filtrar('PAGO', this)">✅ Pagos</button>
            <button class="filter-tab" onclick="filtrar('PENDENTE', this)">⏳ Pendentes</button>
          </div>
          <input class="search-box" type="text" placeholder="🔍 Buscar por nome ou CPF..." oninput="buscar(this.value)" />
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Data / Hora</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Tipo</th>
              <th>Qtd.</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabela-corpo">
            <tr><td colspan="10" class="empty"><div class="icon">⏳</div>Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let todasVendas = [];
    let filtroAtivo = 'todos';
    let busca = '';

    async function carregar() {
      try {
        const res = await fetch('/api/stats');
        const d = await res.json();

        document.getElementById('stat-arrecadado').textContent =
          `R$ ${parseFloat(d.arrecadado).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('stat-mesas').textContent = d.mesas;
        document.getElementById('stat-individuais').textContent = d.individuais;
        document.getElementById('stat-pendentes').textContent = d.pendentes;
        document.getElementById('sub-mesas').textContent =
          `${d.mesas * 4} lugares vendidos`;

        todasVendas = d.vendas || [];
        renderizar();

        const agora = new Date().toLocaleTimeString('pt-BR');
        document.getElementById('ultima-atualizacao').textContent = `Atualizado às ${agora}`;
      } catch (err) {
        console.error(err);
      }
    }

    function filtrar(status, btn) {
      filtroAtivo = status;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      renderizar();
    }

    function buscar(val) {
      busca = val.toLowerCase();
      renderizar();
    }

    function renderizar() {
      let lista = [...todasVendas];

      if (filtroAtivo !== 'todos') {
        lista = lista.filter(v => v.status === filtroAtivo);
      }

      if (busca) {
        lista = lista.filter(v =>
          (v.nome || '').toLowerCase().includes(busca) ||
          (v.cpf || '').includes(busca)
        );
      }

      // Mais recentes primeiro
      lista.reverse();

      const tbody = document.getElementById('tabela-corpo');

      if (lista.length === 0) {
        tbody.innerHTML = `<tr><td colspan="10">
          <div class="empty">
            <div class="icon">🔍</div>
            Nenhuma venda encontrada
          </div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map((v, i) => `
        <tr>
          <td style="color:#9CA3AF;font-size:.75rem">${lista.length - i}</td>
          <td>${v.data || '—'}</td>
          <td><strong>${v.nome || '—'}</strong></td>
          <td style="font-family:monospace">${v.cpf || '—'}</td>
          <td>${v.email || '—'}</td>
          <td>${v.telefone || '—'}</td>
          <td>
            <span class="tipo-badge">
              ${v.tipo === 'mesa' ? '🪑 Mesa' : '👤 Individual'}
            </span>
          </td>
          <td style="text-align:center">${v.quantidade || '—'}</td>
          <td><strong>R$ ${parseFloat(v.total || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</strong></td>
          <td>
            <span class="badge ${v.status === 'PAGO' ? 'badge-pago' : 'badge-pendente'}">
              ${v.status === 'PAGO' ? '✅ Pago' : '⏳ Pendente'}
            </span>
          </td>
        </tr>
      `).join('');
    }

    carregar();
    setInterval(carregar, 30000); // Atualiza a cada 30s
  </script>
</body>
</html>
